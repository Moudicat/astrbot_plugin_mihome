name: astrbot_plugin_mihome
display_name: 米家控制
desc: AstrBot 的米家云端智能管家插件
help: |
  支持通过私聊对米家设备进行扫码授权和控制。
  【可用指令】
  /米家登录 - 尝试获取扫码登录链接
  /米家状态 - 查看当前运行与排障状态
  /刷新米家 - 查看账号下的设备 DID 列表
  /控制米家 [别名] [开/关] - 控制设备 (需在 WebUI 配置 device_map)
  /米家登出 - 清除本地登录态并终结相关沙盒
version: v6.1.0
astrbot_version: ">=4.0.0"
support_platforms:
  - aiocqhttp
author: RyanVaderAn
repo: https://github.com/674537331/astrbot_plugin_mihome
